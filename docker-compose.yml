services:
  backend:
    build:
      context: ./backend
    container_name: sitetemplatecodex-backend
    environment:
      DOMAIN: localhost
      DATABASE_URL: sqlite+aiosqlite:////app/data/template.db
      ENVIRONMENT: development
      FRONTEND_URL: http://localhost:3000
      PUBLIC_API_URL: http://localhost:8000
      SECRET_KEY: change-me-before-publishing
      UPLOAD_STORAGE: local
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: sitetemplatecodex-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
